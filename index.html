<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinda Williams</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/8dd74e0732.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="about-me">
        <nav>
            <div class="personal__logo">Belinda Williams</div>
            <ul class="nav__link--list">
                <li>
                    <a href="" class="
                    nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black">Languages</a>
                </li>
                <li>    
                    <a href="" class="
                    nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black">Project</a>
                </li>
                <li>    
                    <a href="" class="
                    nav__link--anchor
                    nav__link--anchor-primary">Contact</a>
                </li>
            </ul>
        </nav>
        <div class="flex flex-1">
            <div class="about-me__info row">
                <div class="about-me__info--container">
                    <figure class="about-me__picture--mask">
                        <img src="./assets/me.jpeg" class="about-me__picture" alt="Picture of Me"></img>
                    </figure>
                    <h1 class="about-me__info--title">
                        Hey! I'm <span class="text--purple">David Bragg</span> 👋
                    </h1>
                    <p class="about-me__info--para">
                        I'm a <strong class="text--purple">frontend developer</strong> with a strong passion for building responsive and performant web applications with great user experiences that positively impacts the world.
                    </p>
                    <i class="fa-brands fa-linkedin"></i>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
